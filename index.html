<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry 🤍</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ffe6f2,#ffffff);
}


.container{
width:90%;
max-width:420px;
text-align:center;
}


.card{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px #ffc5df;
}


button{
border:0;
padding:14px 28px;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:#ff9dcc;
color:white;
}


.start{
animation:pulse 1.5s infinite;
}


@keyframes pulse{

50%{
transform:scale(1.1);
}

}


.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
}


.no{
background:#999;
position:absolute;
}



h1{
color:#ff75b5;
}


p{
font-size:18px;
line-height:2;
}



.heart{

position:fixed;
bottom:-30px;
font-size:25px;
animation:up 5s linear forwards;

}



@keyframes up{

from{
transform:translateY(0);
opacity:1;
}

to{
transform:translateY(-110vh);
opacity:0;
}

}

.heart-big{
font-size:35px;
animation:beat 1s infinite;
}


@keyframes beat{
50%{
transform:scale(1.3);
}
}


.cat{
width:200px;
height:180px;
margin:auto;
position:relative;
}


.body-cat{
position:absolute;
bottom:10px;
left:50px;
width:100px;
height:80px;
background:#ffb6d9;
border-radius:50%;
}


.head-cat{
position:absolute;
top:10px;
left:40px;
width:120px;
height:100px;
background:#ffc5e3;
border-radius:50%;
}


.ear{
position:absolute;
top:-10px;
width:35px;
height:35px;
background:#ff9dcc;
transform:rotate(45deg);
}


.left{
left:15px;
}


.right{
right:15px;
}


.eye{
position:absolute;
top:45px;
width:12px;
height:18px;
background:#333;
border-radius:50%;
animation:blink 4s infinite;
}


.left-eye{
left:35px;
}


.right-eye{
right:35px;
}


@keyframes blink{
90%{
height:18px;
}
95%{
height:3px;
}
}


.nose{
position:absolute;
top:70px;
left:53px;
width:15px;
height:10px;
background:#ff77aa;
border-radius:50%;
}


.tail{
position:absolute;
right:0;
bottom:45px;
width:70px;
height:18px;
background:#ffb6d9;
border-radius:20px;
animation:tail 1s infinite alternate;
}


@keyframes tail{
from{
transform:rotate(25deg);
}
to{
transform:rotate(-35deg);
}
}


.hand{
position:absolute;
bottom:45px;
width:35px;
height:20px;
background:#ffc5e3;
border-radius:20px;
}


.left-hand{
left:15px;
}


.right-hand{
right:15px;
animation:wave .8s infinite alternate;
}


@keyframes wave{
to{
transform:rotate(30deg);
}
}


.board{
margin-top:20px;
display:inline-block;
background:white;
padding:15px 25px;
border-radius:20px;
color:#ff77b7;
font-size:22px;
font-weight:bold;
}
</style>

</head>


<body>


<div class="container">


<div id="first">

<button class="start" onclick="openPage()">
اضغطي هنا 🤍
</button>

</div>



<div id="second" style="display:none">


<div class="card">

<h1>
سامحيني 🤍
</h1>


<p>
أعتذر منك وأتمنى تقبلين اعتذاري.
</p>


<div class="buttons">


<button onclick="forgive()">
سامحتك 🤍
</button>


<button id="no" class="no">
ما أسامح 😔
</button>


</div>

</div>


</div>



</div>




<script>


function openPage(){

document.getElementById("first").style.display="none";

document.getElementById("second").style.display="block";

createHeart();

}



function createHeart(){

setInterval(function(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="🤍";

h.style.left=Math.random()*100+"vw";


document.body.appendChild(h);


setTimeout(function(){

h.remove();

},5000);


},500);

}




let noButton=document.getElementById("no");


noButton.addEventListener("mouseover",function(){

noButton.style.left=Math.random()*250+"px";

noButton.style.top=Math.random()*200+"px";

});



function forgive(){

document.getElementById("second").innerHTML=`

<div class="card">

<h1>🤍</h1>

<p>
أعتذر عن اللي صار، وأتمنى تسامحيني، وأتمنى تعطيني فرصة أصلح اللي صار. 🤍
</p>

<p>
انتظري 7 ثواني...
</p>

</div>

`;


setTimeout(function(){

document.getElementById("second").innerHTML=`

<div class="card">

<h1>🎁</h1>

<p>
تفتحين الهدية؟
</p>

<button onclick="gift()">
فتح 🤍
</button>

</div>

`;

},7000);


}




function gift(){

document.getElementById("second").innerHTML=`

<div class="card">

<div class="heart-big">💖</div>

<div class="cat">

<div class="tail"></div>

<div class="body-cat"></div>

<div class="head-cat">

<div class="ear left"></div>
<div class="ear right"></div>

<div class="eye left-eye"></div>
<div class="eye right-eye"></div>

<div class="nose"></div>

</div>


<div class="hand left-hand"></div>
<div class="hand right-hand"></div>


</div>


<div class="board">
I'm Sorry 🤍
</div>


</div>

`;

}



</script>


</body>

</html>
<script>


function createMoreHearts(){


setInterval(()=>{


let h=document.createElement("div");


h.className="heart";


h.innerHTML="💗";


h.style.left=Math.random()*100+"vw";


document.body.appendChild(h);



setTimeout(()=>{

h.remove();

},5000);



},300);



}




setInterval(()=>{


let flower=document.createElement("div");


flower.innerHTML=
["🌸","🌹","🌷","✨"]
[Math.floor(Math.random()*4)];



flower.style.position="fixed";

flower.style.top="-30px";

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize="25px";

flower.style.animation=
"heartMove 6s linear";



document.body.appendChild(flower);



setTimeout(()=>{

flower.remove();

},6000);



},800);



</script>


</body>
</html>
