<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry 🤍</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffe4f0,#fff);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:450px;
    text-align:center;
}


button{
    border:none;
    padding:14px 25px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    background:#ff9dcc;
    color:white;
    box-shadow:0 5px 15px #ffc2df;
}


.hidden{
    display:none;
}


.start{
    animation:pulse 1.5s infinite;
}


@keyframes pulse{
    50%{
        transform:scale(1.1);
    }
}


.box{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 30px #ffcce2;
}


h1{
    color:#ff79b7;
}


p{
    font-size:18px;
    line-height:2;
}


.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
}


.no{
    background:#999;
    position:relative;
}


.heart{
    position:fixed;
    bottom:-30px;
    color:#ff8fc5;
    font-size:25px;
    animation:up 5s linear forwards;
}


@keyframes up{

from{
    transform:translateY(0);
    opacity:1;
}

to{
    transform:translateY(-110vh);
    opacity:0;
}

}

</style>

</head>


<body>


<div class="container">


<div id="start">
<button class="start" onclick="startPage()">اضغطي هنا 🤍</button>
</div>



<div id="main" class="hidden">

<div class="box">

<h1>سامحيني 🤍</h1>

<p>
أتمنى تقبلين اعتذاري،
وأتمنى أصلح اللي صار.
</p>


<div class="buttons">

<button onclick="accept()">سامحتك 🤍</button>

<button class="no" id="noBtn">
ما أسامح 😔
</button>


</div>

</div>


</div>


</div>



<script>


function startPage(){

document.getElementById("start").style.display="none";

document.getElementById("main").style.display="block";

hearts();

}



function hearts(){

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="🤍";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);


setTimeout(()=>{

h.remove();

},5000);


},500);

}



let noBtn=document.getElementById("noBtn");


noBtn.addEventListener("mouseover",moveNo);

noBtn.addEventListener("touchstart",moveNo);


function moveNo(){

noBtn.style.position="absolute";

noBtn.style.left=Math.random()*250+"px";

noBtn.style.top=Math.random()*200+"px";

}



function accept(){

document.getElementById("main").innerHTML=`

<div class="box">

<h1>🤍</h1>

<p>
أعتذر عن اللي صار، وأتمنى تسامحيني، وأتمنى تعطيني فرصة أصلح اللي صار. 🤍
</p>

<p>
انتظري قليلاً...
</p>


</div>

`;


setTimeout(showGift,7000);

}
function showGift(){

document.getElementById("main").innerHTML=`

<div class="box">

<h1>🎁 هدية لك</h1>

<p>
تفتحين الهدية؟ 🤍
</p>


<div class="buttons">

<button onclick="openGift()">فتح 🤍</button>

<button class="no" id="notOpen">
عدم فتح 😔
</button>


</div>

</div>

`;


let notOpen=document.getElementById("notOpen");


notOpen.addEventListener("mouseover",escapeGift);

notOpen.addEventListener("touchstart",escapeGift);


function escapeGift(){

notOpen.style.position="absolute";

notOpen.style.left=Math.random()*250+"px";

notOpen.style.top=Math.random()*200+"px";

}


}



function openGift(){

document.getElementById("main").innerHTML=`

<div class="box catBox">


<div class="heartTop">
💖
</div>


<div class="cat">


<div class="tail"></div>


<div class="body"></div>


<div class="head">


<div class="ear e1"></div>

<div class="ear e2"></div>


<div class="eye eye1"></div>

<div class="eye eye2"></div>


<div class="nose"></div>

<div class="mouth"></div>


</div>


<div class="hand h1"></div>

<div class="hand h2"></div>


</div>


<div class="board">
I'm Sorry 🤍
</div>


</div>

`;

moreHearts();

}
<style>


.catBox{
animation:show 1s;
}


@keyframes show{

from{
transform:scale(.3);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}


.cat{

width:190px;
height:170px;
margin:auto;
position:relative;

}


.body{

position:absolute;
bottom:10px;
left:45px;

width:100px;
height:80px;

background:#ffb6d9;

border-radius:50%;

}


.head{

position:absolute;
top:5px;
left:35px;

width:120px;
height:100px;

background:#ffc6e4;

border-radius:50%;

}


.ear{

position:absolute;

width:35px;
height:35px;

background:#ff9dcc;

transform:rotate(45deg);

top:-12px;

}


.e1{
left:15px;
}


.e2{
right:15px;
}



.eye{

position:absolute;

top:45px;

width:12px;
height:18px;

background:#333;

border-radius:50%;

animation:blink 4s infinite;

}


.eye1{
left:35px;
}


.eye2{
right:35px;
}



@keyframes blink{

90%{
height:18px;
}

95%{
height:3px;
}

}



.nose{

position:absolute;

top:65px;
left:53px;

width:15px;
height:10px;

background:#ff75aa;

border-radius:50%;

}


.mouth{

position:absolute;

top:75px;
left:47px;

width:25px;
height:12px;

border-bottom:3px solid #555;

border-radius:50%;

}



.tail{

position:absolute;

right:5px;

bottom:35px;

width:70px;
height:18px;

background:#ffb6d9;

border-radius:20px;

animation:tail 1s infinite alternate;

transform-origin:left;

}



@keyframes tail{

from{
transform:rotate(25deg);
}

to{
transform:rotate(-35deg);
}

}



.hand{

position:absolute;

bottom:40px;

width:35px;
height:20px;

background:#ffc6e4;

border-radius:20px;

}


.h1{
left:15px;
}


.h2{

right:15px;

animation:wave .8s infinite alternate;

}



@keyframes wave{

to{
transform:rotate(30deg);
}

}



.board{

margin-top:20px;

display:inline-block;

background:white;

padding:15px 25px;

border-radius:20px;

font-size:22px;

font-weight:bold;

color:#ff77b7;

}


.heartTop{

font-size:35px;

animation:beat 1s infinite;

}


@keyframes beat{

50%{
transform:scale(1.3);
}

}


</style>
<script>


function moreHearts(){

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="💗";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);


setTimeout(()=>{

h.remove();

},5000);


},300);

}



setInterval(()=>{


let flower=document.createElement("div");


flower.innerHTML=["🌸","🌹","🌷"][Math.floor(Math.random()*3)];


flower.style.position="fixed";

flower.style.top="-20px";

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize="25px";

flower.style.animation="up 6s linear";


document.body.appendChild(flower);



setTimeout(()=>{

flower.remove();

},6000);



},900);



</script>


</body>
</html>
