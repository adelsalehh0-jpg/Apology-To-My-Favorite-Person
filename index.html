<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 🤍</title>

<style>
*{
    box-sizing:border-box;
    font-family: "Arial", sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ffe6f2,#fff);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:450px;
    text-align:center;
    position:relative;
}

button{
    border:none;
    padding:14px 28px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    background:#ff9fcf;
    color:white;
    box-shadow:0 5px 15px #ffb6d9;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}


/* البداية */
.start-btn{
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.1);
    }
}


/* اللمعات */
.sparkle{
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    animation: sparkle 2s infinite;
}

@keyframes sparkle{
    0%,100%{
        opacity:0;
        transform:scale(0);
    }
    50%{
        opacity:1;
        transform:scale(1);
    }
}


/* القلوب */
.heart{
    position:absolute;
    color:#ff8fc5;
    font-size:25px;
    animation:heartFly 5s linear infinite;
}

@keyframes heartFly{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-20vh) scale(1.5);
        opacity:0;
    }
}


/* رسالة الاعتذار */
.message-box{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 30px #ffc7df;
}

.message-box h1{
    color:#ff75b5;
}

.message-box p{
    font-size:18px;
    line-height:1.8;
}


/* الأزرار */
.buttons{
    margin-top:20px;
    display:flex;
    gap:15px;
    justify-content:center;
}

.no-btn{
    background:#aaa;
    position:relative;
}


/* صندوق الهدية */
.gift{
    width:160px;
    height:120px;
    background:#ff9fcf;
    margin:25px auto;
    border-radius:15px;
    position:relative;
    cursor:pointer;
    box-shadow:0 10px 20px #ffc0dd;
}

.gift:before{
    content:"";
    position:absolute;
    width:30px;
    height:100%;
    background:#fff;
    left:65px;
}

.gift:after{
    content:"";
    position:absolute;
    width:100%;
    height:25px;
    background:#fff;
    top:45px;
}


/* القط سيكمل في الجزء القادم */

</style>
</head>

<body>

<div class="container">

<div id="start">
    <button class="start-btn" onclick="start()">اضغطي هنا 🤍</button>
</div>


<div id="sorry" class="hidden">

<div class="message-box">
<h1>سامحيني 🤍</h1>

<p>
أنا آسف... أتمنى تقبلين اعتذاري،
وأوعدك أني أحاول أصلح كل شيء 💖
</p>

<div class="buttons">
<button onclick="forgive()">سامحتك 🤍</button>
<button class="no-btn" id="no">ما أسامح 😂</button>
</div>

</div>

</div>


</div>


<script>

function start(){

document.getElementById("start").style.display="none";
document.getElementById("sorry").style.display="block";

createHearts();

}


function createHearts(){

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";
h.innerHTML="♥";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},6000);


},500);

}


let no=document.getElementById("no");

no.addEventListener("mouseover",moveNo);
no.addEventListener("touchstart",moveNo);


function moveNo(){

no.style.position="absolute";

no.style.left=Math.random()*250+"px";
no.style.top=Math.random()*200+"px";

}


function forgive(){

document.getElementById("sorry").innerHTML=
`
<div class="message-box">
<h1>شكراً لأنك سامحتيني 🤍</h1>
<p>انتظري قليلاً... عندي لك شيء جميل 🎁</p>
</div>
`;

setTimeout(showGift,8000);

}


function showGift(){

document.getElementById("sorry").innerHTML=
`
<div class="message-box">
<h1>🎁 هدية لك</h1>
<p>تفتحين الهدية؟</p>

<div class="buttons">
<button onclick="openGift()">فتح 🤍</button>
<button id="notOpen" class="no-btn">عدم فتح 😂</button>
</div>

</div>
`;

let b=document.getElementById("notOpen");

b.addEventListener("mouseover",()=>{
b.style.position="absolute";
b.style.left=Math.random()*250+"px";
b.style.top=Math.random()*200+"px";
});

}

</script>
<!-- بداية الجزء الثاني -->

<style>

.cat-area{
    margin-top:20px;
    animation:catAppear 1.5s ease;
}

@keyframes catAppear{
    from{
        opacity:0;
        transform:scale(.3);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}


.cat{
    width:180px;
    height:160px;
    margin:auto;
    position:relative;
}


/* جسم القط */
.body-cat{
    width:110px;
    height:90px;
    background:#ffb6d9;
    border-radius:50%;
    position:absolute;
    bottom:15px;
    left:35px;
}


/* الرأس */
.head-cat{
    width:120px;
    height:100px;
    background:#ffc5e3;
    border-radius:50%;
    position:absolute;
    top:0;
    left:30px;
}


/* الأذن */
.ear{
    width:35px;
    height:35px;
    background:#ff9dcc;
    position:absolute;
    top:-10px;
    transform:rotate(45deg);
}

.left-ear{
    left:35px;
}

.right-ear{
    right:35px;
}


/* العيون */
.eye{
    width:12px;
    height:18px;
    background:#333;
    border-radius:50%;
    position:absolute;
    top:45px;
    animation:blink 4s infinite;
}


.left-eye{
    left:35px;
}

.right-eye{
    right:35px;
}


@keyframes blink{

0%,90%,100%{
height:18px;
}

95%{
height:3px;
}

}


/* الأنف */
.nose{
    width:15px;
    height:10px;
    background:#ff77aa;
    border-radius:50%;
    position:absolute;
    top:68px;
    left:53px;
}


/* الفم */
.mouth{
    width:25px;
    height:12px;
    border-bottom:3px solid #555;
    border-radius:50%;
    position:absolute;
    top:75px;
    left:48px;
}


/* الذيل */
.tail{
    width:70px;
    height:18px;
    background:#ffb6d9;
    border-radius:20px;
    position:absolute;
    right:5px;
    bottom:35px;
    transform-origin:left center;
    animation:tailMove 1s infinite alternate;
}


@keyframes tailMove{

from{
transform:rotate(20deg);
}

to{
transform:rotate(-35deg);
}

}


/* اليد */
.hand{
    width:35px;
    height:20px;
    background:#ffc5e3;
    border-radius:20px;
    position:absolute;
    bottom:45px;
}

.left-hand{
    left:10px;
}

.right-hand{
    right:10px;
    animation:wave .8s infinite alternate;
}


@keyframes wave{

from{
transform:rotate(0deg);
}

to{
transform:rotate(25deg);
}

}


/* اللوحة */
.board{
    background:white;
    padding:15px 25px;
    border-radius:20px;
    margin-top:15px;
    display:inline-block;
    color:#ff77aa;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 5px 15px #ffc7df;
}


/* قلب فوق القط */
.big-heart{
    font-size:35px;
    animation:beat 1s infinite;
}


@keyframes beat{

50%{
transform:scale(1.3);
}

}

</style>


<script>


function openGift(){

document.getElementById("sorry").innerHTML=
`

<div class="message-box">

<div class="big-heart">💖</div>

<div class="cat-area">

<div class="cat">


<div class="tail"></div>

<div class="body-cat"></div>


<div class="head-cat">

<div class="ear left-ear"></div>
<div class="ear right-ear"></div>


<div class="eye left-eye"></div>
<div class="eye right-eye"></div>

<div class="nose"></div>
<div class="mouth"></div>


</div>


<div class="hand left-hand"></div>
<div class="hand right-hand"></div>


</div>


<div class="board">
I'm Sorry 🤍
</div>


</div>


</div>

`;

createMoreHearts();

}


function createMoreHearts(){

setInterval(()=>{

let h=document.createElement("div");

h.innerHTML="💗";

h.style.position="fixed";
h.style.left=Math.random()*100+"%";
h.style.bottom="-20px";
h.style.fontSize=(20+Math.random()*20)+"px";
h.style.animation="heartFly 4s linear";


document.body.appendChild(h);


setTimeout(()=>{
h.remove();
},4000);


},300);

}


</script>

<!-- نهاية الجزء الثاني -->
<!-- بداية الجزء الثالث والأخير -->

<style>

/* ورود متساقطة */
.flower{
    position:fixed;
    top:-30px;
    font-size:25px;
    animation:fallFlower linear forwards;
    pointer-events:none;
}

@keyframes fallFlower{

from{
    transform:translateY(-50px) rotate(0deg);
    opacity:1;
}

to{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
}

}


/* نجوم ولمعات */
.glow{
    position:fixed;
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 15px white;
    animation:glowMove 2s infinite;
    pointer-events:none;
}


@keyframes glowMove{

0%,100%{
opacity:0;
transform:scale(.2);
}

50%{
opacity:1;
transform:scale(1.4);
}

}


/* تحسين ظهور الهدية */
.gift-open{
    animation:openGift 1s ease;
}


@keyframes openGift{

from{
transform:rotateX(90deg) scale(.5);
opacity:0;
}

to{
transform:rotateX(0) scale(1);
opacity:1;
}

}

</style>


<script>


/* ورود متحركة */

setInterval(()=>{

let f=document.createElement("div");

f.className="flower";

let flowers=["🌸","🌹","🌷","🌺"];

f.innerHTML=
flowers[Math.floor(Math.random()*flowers.length)];


f.style.left=Math.random()*100+"vw";

f.style.animationDuration=
(5+Math.random()*5)+"s";


document.body.appendChild(f);


setTimeout(()=>{
f.remove();
},10000);


},800);



/* لمعات */

setInterval(()=>{

let s=document.createElement("div");

s.className="glow";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";


document.body.appendChild(s);


setTimeout(()=>{
s.remove();
},2000);


},400);



/* إضافة حركة لصندوق الهدية عند فتحه */

let oldOpenGift=openGift;

openGift=function(){

oldOpenGift();

setTimeout(()=>{

let cat=document.querySelector(".cat-area");

if(cat){
cat.classList.add("gift-open");
}

},100);

}



</script>


</body>
</html>
