<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry 🤍</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#ffe5f2,#ffffff);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
}

.card{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 30px #ffc6df;
}

button{
    border:0;
    padding:15px 30px;
    border-radius:30px;
    background:#ff9dcc;
    color:white;
    font-size:18px;
    cursor:pointer;
}

h1{
    color:#ff75b5;
}

p{
    font-size:18px;
    line-height:2;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.no{
    background:#999;
    position:relative;
}

.hidden{
    display:none;
}


</style>

</head>


<body>


<div class="container">


<div id="start">

<button onclick="start()">
اضغطي هنا 🤍
</button>

</div>



<div id="page" class="hidden">

<div class="card">

<h1>
سامحيني 🤍
</h1>


<p>
أتمنى تقبلين اعتذاري.
</p>


<div class="buttons">

<button onclick="sorry()">
سامحتك 🤍
</button>


<button id="no" class="no">
ما أسامح 😔
</button>


</div>

</div>

</div>


</div>




<script>


function start(){

document.getElementById("start").style.display="none";

document.getElementById("page").style.display="block";

}



let no=document.getElementById("no");


no.onmouseover=function(){

no.style.left=Math.random()*200+"px";

no.style.top=Math.random()*150+"px";

};



function sorry(){

document.getElementById("page").innerHTML=

`

<div class="card">

<h1>🤍</h1>

<p>
أعتذر عن اللي صار، وأتمنى تسامحيني، وأتمنى تعطيني فرصة أصلح اللي صار. 🤍
</p>

</div>

`;

}



</script>


</body>

</html>
